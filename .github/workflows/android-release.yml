name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-android-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Release signing secrets are required to publish a reusable APK."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/media-hub-upload.keystore"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release APK
        env:
          ANDROID_VERSION_NAME: ${{ github.ref_name }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/media-hub-upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          pnpm build:mobile
          pnpm exec cap sync android

          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/release/app-release.apk media-hub-${{ github.ref_name }}-android-release.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: media-hub-${{ github.ref_name }}-android-release.apk
          generate_release_notes: true