name: Publish Android APK Assets

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'static/releases/android/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-assets
  cancel-in-progress: true

jobs:
  publish-assets:
    runs-on: ubuntu-latest
    env:
      ANDROID_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android build metadata
        id: android_meta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          VERSION_NAME="${PACKAGE_VERSION} (build ${GITHUB_RUN_NUMBER})"
          VERSION_SLUG="${PACKAGE_VERSION}-build-${GITHUB_RUN_NUMBER}"
          APK_NAME="media-hub-${VERSION_SLUG}.apk"

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_slug=${VERSION_SLUG}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Select Android build type
        id: android_build
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "variant=Release" >> "$GITHUB_OUTPUT"
            echo "build_type=release" >> "$GITHUB_OUTPUT"
            echo "artifact_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            echo "variant=Debug" >> "$GITHUB_OUTPUT"
            echo "build_type=debug" >> "$GITHUB_OUTPUT"
            echo "artifact_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Android signing keystore
        if: steps.android_build.outputs.build_type == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/media-hub-upload.keystore"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Netlify site URL
        id: netlify_meta
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          NETLIFY_SITE_URL=$(curl -sf "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}" \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" | jq -r '.ssl_url // .url // empty')
          echo "site_url=${NETLIFY_SITE_URL}" >> "$GITHUB_OUTPUT"
          echo "Netlify site URL: ${NETLIFY_SITE_URL}"

      - name: Build Android APK
        env:
          ANDROID_VERSION_NAME: ${{ steps.android_meta.outputs.version_name }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/media-hub-upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
          PUBLIC_BUILD_VERSION_CODE: ${{ github.run_number }}
          PUBLIC_RELEASE_BASE_URL: ${{ steps.netlify_meta.outputs.site_url }}
        run: |
          pnpm build:mobile
          pnpm exec cap sync android

          cd android
          chmod +x gradlew
          ./gradlew assemble${{ steps.android_build.outputs.variant }}

      - name: Publish APK into static assets
        env:
          ARTIFACT_PATH: ${{ steps.android_build.outputs.artifact_path }}
          APK_NAME: ${{ steps.android_meta.outputs.apk_name }}
          BUILD_TYPE: ${{ steps.android_build.outputs.build_type }}
          VERSION_NAME: ${{ steps.android_meta.outputs.version_name }}
          PACKAGE_VERSION: ${{ steps.android_meta.outputs.package_version }}
          NETLIFY_SITE_URL: ${{ steps.netlify_meta.outputs.site_url }}
        run: |
          mkdir -p static/releases/android
          find static/releases/android -maxdepth 1 -type f \( -name '*.apk' -o -name '*.json' \) -delete
          cp "$ARTIFACT_PATH" "static/releases/android/latest.apk"

          APK_SIZE=$(stat -c%s "static/releases/android/latest.apk")
          APK_SHA256=$(sha256sum "static/releases/android/latest.apk" | cut -d ' ' -f1)
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ -n "$NETLIFY_SITE_URL" ]]; then
            APK_URL="${NETLIFY_SITE_URL}/releases/android/latest.apk"
          else
            APK_URL="/releases/android/latest.apk"
          fi

          cat <<EOF > static/releases/android/latest.json
          {
            "version": "$PACKAGE_VERSION",
            "versionCode": ${ANDROID_VERSION_CODE},
            "versionName": "$VERSION_NAME",
            "buildType": "$BUILD_TYPE",
            "fileName": "$APK_NAME",
            "url": "$APK_URL",
            "sizeBytes": $APK_SIZE,
            "sha256": "$APK_SHA256",
            "publishedAt": "$PUBLISHED_AT",
            "commitSha": "${GITHUB_SHA}",
            "commitUrl": "https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          }
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: media-hub-android-${{ steps.android_build.outputs.build_type }}-apk
          path: ${{ steps.android_build.outputs.artifact_path }}
          if-no-files-found: error

      - name: Commit updated APK assets
        env:
          PACKAGE_VERSION: ${{ steps.android_meta.outputs.package_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A static/releases/android

          if git diff --cached --quiet; then
            echo "No APK asset changes to commit."
            exit 0
          fi

          git commit -m "chore: update Android APK assets for ${PACKAGE_VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"